name: Deploy React App

on:
  push:
    branches:
      - main # Change to your default branch name if it is 'master'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout1 Repository 📁
        uses: actions/checkout@v4

      - name: Setup Node.js ⚙️
        uses: actions/setup-node@v4
        with:
          node-version: 22 # 🚀 Upgraded from 20 to the active runner standard
          cache: 'npm'

      - name: Install dependencies 📥
        run: npm ci

      - name: Build Application 🛠️
        run: npm run build

      - name: Upload artifact 📤
        uses: actions/upload-pages-artifact@v3
        with:
          # Change to './build' if your project uses Create React App
          path: './dist' 

      - name: Deploy to GitHub Pages 🚀
        id: deployment
        uses: actions/deploy-pages@v4
